<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_10%_8%,#bfdbfe_0%,transparent_28%),radial-gradient(circle_at_88%_12%,#bbf7d0_0%,transparent_24%),linear-gradient(135deg,#eff6ff_0%,#f8fafc_45%,#ecfdf5_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <main class="w-full max-w-2xl overflow-hidden rounded-3xl border border-slate-200 bg-white/90 p-7 shadow-[0_30px_100px_rgba(15,23,42,0.12)] backdrop-blur sm:p-10">
      <div class="inline-flex h-11 w-11 items-center justify-center rounded-xl bg-sky-50 text-sky-700">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <p class="mt-3 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Register</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">Create Account</h1>
      <p class="mt-2 text-sm text-slate-500">Fill in the required fields to create a new account.</p>

      {{if .Error}}
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{.Error}}
      </div>
      {{end}}

      {{if .Success}}
      <div class="mt-5 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
        <i class="fa-solid fa-circle-check mr-2"></i>Registration completed. <a href="/login" class="font-bold underline">Go to Sign In</a>
      </div>
      {{end}}

      <form method="post" class="mt-6 grid gap-4 sm:grid-cols-2">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <label class="block sm:col-span-2">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Username</span>
          <input name="username" value="{{.Username}}" autocomplete="username" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100">
        </label>

        <label class="block sm:col-span-2">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Email</span>
          <input name="email" type="email" value="{{.Email}}" autocomplete="email" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100">
        </label>

        <label class="block sm:col-span-2">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Display Name</span>
          <input name="display_name" value="{{.DisplayName}}" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100">
        </label>

        <label class="block sm:col-span-2">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Password</span>
          <input name="password" type="password" autocomplete="new-password" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100">
        </label>

        <button type="submit" class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-sky-600 to-indigo-700 px-4 py-3 text-sm font-bold text-white shadow-[0_14px_30px_rgba(37,99,235,0.25)] transition hover:brightness-105 sm:col-span-2">
          <i class="fa-solid fa-user-plus"></i>
          Create Account
        </button>
      </form>
    </main>
  </div>
</body>
</html>
