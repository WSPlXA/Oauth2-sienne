<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン — Sienne IDP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --bg-cream: #fbfaf8;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.06);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      --accent-emerald: #059669;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --input-bg: #ffffff;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-cream);
      overflow: hidden;
      color: var(--text-main);
    }

    /* Soft Mesh Background */
    .mesh-background {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: var(--bg-cream);
      background-image: 
        radial-gradient(at 0% 0%, #fff 0px, transparent 50%),
        radial-gradient(at 100% 0%, #f1efe9 0px, transparent 50%),
        radial-gradient(at 100% 100%, #ffffff 0px, transparent 50%),
        radial-gradient(at 0% 100%, #ece9e2 0px, transparent 50%);
      filter: blur(40px);
      animation: mesh-drift 15s ease-in-out infinite alternate;
    }

    @keyframes mesh-drift {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: var(--glass-shadow);
      opacity: 0;
      transform: translateY(30px);
      animation: card-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes card-enter {
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .shield-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      color: var(--accent-emerald);
      filter: drop-shadow(0 4px 10px rgba(5, 150, 105, 0.15));
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--accent-emerald);
      box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.08);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent-emerald);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 12px;
    }

    .btn-submit:hover {
      filter: brightness(1.05);
      transform: scale(1.01);
      box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 11px;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .divider span { padding: 0 16px; }

    .btn-secondary {
      width: 100%;
      background: #f8fafc;
      color: var(--text-main);
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .banner {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .banner-error { background: #fef2f2; border: 1px solid #fee2e2; color: var(--danger); }
    .banner-success { background: #f0fdf4; border: 1px solid #dcfce7; color: var(--success); }

    .footer { text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 11px; }

    .stagger { opacity: 0; transform: translateY(10px); animation: stagger-in 0.5s ease-out forwards; }
    @keyframes stagger-in { to { opacity: 1; transform: translateY(0); } }
    .s1 { animation-delay: 0.3s; } .s2 { animation-delay: 0.4s; } .s3 { animation-delay: 0.5s; } .s4 { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <div class="mesh-background"></div>
  <main class="container">
    <div class="card">
      <div class="header">
        <div class="shield-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>ログイン</h1>
        <p class="subtitle">Sienne 認証サービスへようこそ</p>
      </div>

      {{if .Error}}
      <div class="banner banner-error stagger s1">
        <span>{{.Error}}</span>
      </div>
      {{end}}

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="return_to" value="{{.ReturnTo}}">
        <div class="form-group stagger s2">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" name="username" value="{{.Username}}" placeholder="username" required>
        </div>
        <div class="form-group stagger s3">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="stagger s4">
          <button type="submit" class="btn-submit">サインイン</button>
        </div>
      </form>

      {{if .FederatedOIDCEnabled}}
      <div class="divider stagger s4"><span>または</span></div>
      <div class="stagger s4">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <input type="hidden" name="return_to" value="{{.ReturnTo}}">
          <input type="hidden" name="method" value="federated_oidc">
          <button type="submit" class="btn-secondary">OpenID Connect でサインイン</button>
        </form>
      </div>
      {{end}}

      <div class="footer stagger s4">&copy; 2026 Sienne Identity System</div>
    </div>
  </main>
</body>
</html>
