<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_15%_15%,#dbeafe_0%,transparent_30%),radial-gradient(circle_at_85%_20%,#fef3c7_0%,transparent_32%),linear-gradient(135deg,#f8fafc_0%,#eef2ff_55%,#f0fdfa_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center justify-center px-4 py-10 sm:px-6">
    <main class="w-full max-w-xl rounded-3xl border border-slate-200 bg-white/90 p-7 text-center shadow-[0_30px_90px_rgba(15,23,42,0.12)] backdrop-blur sm:p-10">
      <div class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-100 text-slate-700">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <p class="mt-4 text-xs font-bold uppercase tracking-[0.22em] text-slate-500">HTTP 404</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">Page Not Found</h1>
      <p class="mt-3 text-sm text-slate-600">The requested route does not exist.</p>

      <div class="mt-6 rounded-xl border border-slate-200 bg-slate-50 p-4 text-left text-xs text-slate-600">
        <div><span class="font-semibold text-slate-700">Method:</span> {{.Method}}</div>
        <div class="mt-1 break-all"><span class="font-semibold text-slate-700">Path:</span> {{.Path}}</div>
      </div>

      <a href="/login" class="mt-6 inline-flex items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 py-3 text-sm font-bold text-white transition hover:bg-slate-800">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Sign In
      </a>
    </main>
  </div>
</body>
</html>
