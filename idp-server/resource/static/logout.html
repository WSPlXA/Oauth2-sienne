<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログアウト — Sienne IDP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --bg-cream: #fbfaf8;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.06);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      --accent-orange: #ea580c;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-cream);
      overflow: hidden;
      color: var(--text-main);
    }

    .mesh-background {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: var(--bg-cream);
      background-image: 
        radial-gradient(at 0% 0%, #fff 0px, transparent 50%),
        radial-gradient(at 100% 0%, #f1efe9 0px, transparent 50%),
        radial-gradient(at 100% 100%, #ffffff 0px, transparent 50%),
        radial-gradient(at 0% 100%, #ece9e2 0px, transparent 50%);
      filter: blur(40px);
      animation: mesh-drift 15s ease-in-out infinite alternate;
    }

    @keyframes mesh-drift { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

    .container { width: 100%; max-width: 440px; padding: 20px; }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: var(--glass-shadow);
      opacity: 0;
      transform: translateY(30px);
      animation: card-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      text-align: center;
    }

    @keyframes card-enter { to { opacity: 1; transform: translateY(0); } }

    .icon-box {
      width: 64px; height: 64px; margin: 0 auto 24px;
      color: var(--accent-orange); background: #fff7ed;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 1px solid #ffedd5;
    }

    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; color: #1e293b; }
    .status-text { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }

    .session-info {
      background: rgba(255, 255, 255, 0.5); border: 1px solid #e2e8f0;
      border-radius: 18px; padding: 16px; margin-bottom: 24px; text-align: left;
    }

    .info-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .info-value { font-size: 13px; font-family: monospace; color: var(--text-main); word-break: break-all; }

    .btn-logout {
      width: 100%; background: var(--accent-orange); color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
    }

    .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(234, 88, 12, 0.3); }

    .footer { margin-top: 32px; color: var(--text-muted); font-size: 11px; }

    .stagger { opacity: 0; transform: translateY(10px); animation: stagger-in 0.5s ease-out forwards; }
    @keyframes stagger-in { to { opacity: 1; transform: translateY(0); } }
    .s1 { animation-delay: 0.3s; } .s2 { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <div class="mesh-background"></div>
  <main class="container">
    <div class="card">
      <div class="icon-box stagger s1">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
      <h1 class="stagger s1">ログアウト</h1>
      <p class="status-text stagger s1">アカウントからサインアウトし、セッションを終了します。</p>

      {{if .ClientID}}
      <div class="session-info stagger s2">
        <div class="info-label">クライアント ID</div>
        <div class="info-value">{{.ClientID}}</div>
      </div>
      {{end}}

      <form id="logout-form" method="post" action="/connect/logout" class="stagger s2">
        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="post_logout_redirect_uri" value="{{.PostLogoutRedirectURI}}">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <button type="submit" class="btn-logout">ログアウトを実行</button>
      </form>
      <div class="footer stagger s2">Sienne IDP &bull; セッション管理</div>
    </div>
  </main>
  <script>
    window.addEventListener("load", function () {
      setTimeout(function() {
        var form = document.getElementById("logout-form");
        if (form) { form.requestSubmit ? form.requestSubmit() : form.submit(); }
      }, 1500);
    });
  </script>
</body>
</html>
