<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログアウト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

    :root {
      --bg: #f4eee6;
      --surface: rgba(255, 250, 244, 0.9);
      --line: rgba(65, 46, 18, 0.12);
      --text: #201914;
      --muted: #6d6459;
      --danger: #c2410c;
      --danger-strong: #9a3412;
      --danger-soft: rgba(194, 65, 12, 0.1);
      --shadow: 0 26px 86px rgba(46, 31, 16, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(217, 119, 6, 0.15), transparent 26%),
        radial-gradient(circle at 85% 80%, rgba(194, 65, 12, 0.12), transparent 24%),
        linear-gradient(135deg, #f8f2eb 0%, #f2eadf 52%, #eee3d6 100%);
    }

    .panel {
      width: min(100%, 460px);
      border-radius: 30px;
      border: 1px solid var(--line);
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }

    .mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid rgba(194, 65, 12, 0.14);
    }

    .eyebrow {
      margin-top: 18px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    h1 {
      margin: 10px 0 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 32px;
      letter-spacing: -0.04em;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .banner {
      margin-top: 18px;
      padding: 13px 15px;
      border-radius: 16px;
      background: #fff1f1;
      border: 1px solid rgba(180, 35, 24, 0.16);
      color: #b42318;
      font-size: 13px;
      line-height: 1.6;
    }

    .meta {
      margin-top: 22px;
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .label {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .value {
      margin-top: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      word-break: break-all;
    }

    .value + .label {
      margin-top: 16px;
      display: block;
    }

    .actions {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 15px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--danger) 0%, var(--danger-strong) 100%);
      box-shadow: 0 14px 28px rgba(194, 65, 12, 0.24);
    }

    .secondary {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 520px) {
      body { padding: 14px; }
      .panel { border-radius: 24px; padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="mark" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </div>

    <div class="eyebrow">End Session</div>
    <h1>ログアウト</h1>
    <p class="hint">セッションを終了しています。</p>

    {{if .Error}}
    <div class="banner">{{.Error}}</div>
    {{end}}

    <div class="meta">
      <div class="label">Client ID</div>
      <div class="value">{{if .ClientID}}{{.ClientID}}{{else}}-{{end}}</div>
      <span class="label">Post Logout Redirect</span>
      <div class="value">{{if .PostLogoutRedirectURI}}{{.PostLogoutRedirectURI}}{{else}}/login{{end}}</div>
    </div>

    <form id="logout-form" method="post" action="/connect/logout">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="post_logout_redirect_uri" value="{{.PostLogoutRedirectURI}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <div class="actions">
        <button type="submit" class="btn">ログアウトを実行</button>
        <div class="secondary">自動で遷移しない場合のみボタンを押してください。</div>
      </div>
    </form>
  </main>

  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        var form = document.getElementById("logout-form");
        if (form) {
          if (form.requestSubmit) {
            form.requestSubmit();
            return;
          }
          form.submit();
        }
      }, 600);
    });
  </script>
</body>
</html>
