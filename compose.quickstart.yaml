name: oauth2-sienne-idp

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-apppass}
    ports:
      - "${IDP_MYSQL_PORT:-3306}:3306"
    volumes:
      - idp-mysql-data:/var/lib/mysql
      - ./idp-server/scripts/migrate.sql:/docker-entrypoint-initdb.d/001-migrate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${IDP_REDIS_PORT:-6379}:6379"
    volumes:
      - idp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s

  server:
    image: ${IDP_SERVER_IMAGE:-ghcr.io/wsplxa/oauth2-sienne-idp-server:latest}
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-apppass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      APP_ENV: ${IDP_APP_ENV:-dev}
      SESSION_TTL: ${IDP_SESSION_TTL:-8h}
      ISSUER: ${IDP_ISSUER:-http://localhost:8080}
      LISTEN_ADDR: :8080
      SIGNING_KEY_DIR: scripts/dev_keys
      SIGNING_KEY_CHECK_INTERVAL: ${IDP_SIGNING_KEY_CHECK_INTERVAL:-1h}
      SIGNING_KEY_ROTATE_BEFORE: ${IDP_SIGNING_KEY_ROTATE_BEFORE:-24h}
      SIGNING_KEY_RETIRE_AFTER: ${IDP_SIGNING_KEY_RETIRE_AFTER:-24h}
    ports:
      - "${IDP_SERVER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  idp-mysql-data:
  idp-redis-data:
